name: Auto Publish Opencode

on:
  push:
    branches: [main]
    paths:
      - 'packages/opencode/**'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish @dohzoh/opencode-unsloth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dohzoh'

      - name: Install dependencies
        run: npm install

      - name: Get version
        run: echo "VERSION=$(node -p "require('./packages/opencode/package.json').version")" >> $GITHUB_OUTPUT
        id: version

      - name: Publish to GitHub Packages
        run: |
          cd packages/opencode
          npm publish --access public --no-git-check

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a opencode@${{ steps.version.outputs.VERSION }} -m "opencode provider ${{ steps.version.outputs.VERSION }}"
          git push origin opencode@${{ steps.version.outputs.VERSION }}
