name: Auto Publish Pi

on:
  push:
    branches: [main]
    paths:
      - 'packages/pi/**'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish @dohzoh/pi-unsloth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Bump version
        run: |
          cd packages/pi
          npm version patch --no-git-check
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        id: version

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN" >> ~/.npmrc
          pnpm --filter @dohzoh/pi-unsloth publish --no-git-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a pi@${{ steps.version.outputs.VERSION }} -m "pi provider ${{ steps.version.outputs.VERSION }}"
          git push origin pi@${{ steps.version.outputs.VERSION }}
