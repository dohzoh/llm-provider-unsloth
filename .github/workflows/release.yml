name: CI/CD

on:
  push:
    branches: [main]
    tags: ['pi@*', 'opencode@*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

  publish-pi:
    name: Publish @llm-provider-unsloth/pi
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/pi@')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/pi@}" >> $GITHUB_OUTPUT

      - name: Update package version
        run: pnpm --filter @llm-provider-unsloth/pi version ${{ steps.version.outputs.VERSION }} --no-git-check

      - name: Publish to GitHub Packages
        run: pnpm --filter @llm-provider-unsloth/pi publish --no-git-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-opencode:
    name: Publish @llm-provider-unsloth/opencode
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/opencode@')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/opencode@}" >> $GITHUB_OUTPUT

      - name: Update package version
        run: pnpm --filter @llm-provider-unsloth/opencode version ${{ steps.version.outputs.VERSION }} --no-git-check

      - name: Publish to GitHub Packages
        run: pnpm --filter @llm-provider-unsloth/opencode publish --no-git-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
